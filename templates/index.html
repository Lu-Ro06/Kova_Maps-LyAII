<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kova Maps</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0ea5e9; /* Sky Blue - Corporate */
      --primary-hover: #0284c7;
      --bg-glass: rgba(17, 24, 39, 0.9); /* Gray 900 - Graphite */
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #10b981; /* Emerald Green */
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      display: flex;
      overflow: hidden;
    }

    #mapa {
      flex: 1;
      z-index: 0;
    }

    .panel-lateral {
      position: fixed;
      top: 20px;
      width: 350px;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--text-main);
      padding: 1.5rem;
      border-radius: 16px;
      border: 1px solid var(--border-glass);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px inset rgba(255, 255, 255, 0.05);
      z-index: 1000;
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) transparent;
    }

    #panel-izquierdo {
      left: 20px;
    }

    #panel-derecho {
      right: 20px;
      display: none;
    }

    .panel-lateral::-webkit-scrollbar {
      width: 6px;
    }
    .panel-lateral::-webkit-scrollbar-thumb {
      background-color: var(--primary);
      border-radius: 10px;
    }

    .panel-lateral h3 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: #ffffff;
      text-align: center;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      border-bottom: 1px solid var(--border-glass);
      padding-bottom: 0.8rem;
    }

    .grupo-entrada {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    input.entrada-ubicacion, select {
      padding: 0.7rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0, 0, 0, 0.2);
      outline: none;
      font-size: 1rem;
      color: #fff;
      width: 100%;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    input.entrada-ubicacion:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
      background: rgba(0, 0, 0, 0.3);
    }

    select option {
      background: #1e293b;
      color: #fff;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.7rem;
      color: white;
      background: var(--primary);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease-in-out;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px);
      background: var(--primary-hover);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
    }

    button:active {
      transform: translateY(1px);
    }

    #resultados {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .resultado-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .resultado-card i {
      font-size: 1.3rem;
      width: 24px;
      text-align: center;
    }

    .resultado-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .resultado-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .resultado-value {
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* Colores específicos de icono */
    .icon-dist { color: #38bdf8; }
    .icon-time { color: #f472b6; }
    .icon-gas { color: #a3e635; }
    .icon-elev { color: #fbbf24; }
    .icon-toll { color: #facc15; }
    .icon-op { color: #818cf8; }
    .icon-alert { color: #f87171; }
    .icon-total { color: #34d399; font-size: 1.5rem !important; }

    #caseta {
      max-height: 140px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    
    #caseta::-webkit-scrollbar { width: 4px; }
    #caseta::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); }

    .caseta-item {
      font-size: 0.85rem;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .caseta-item:last-child { border-bottom: none; }

    .total-card {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.3));
      border-color: rgba(16, 185, 129, 0.4);
      margin-top: 0.5rem;
    }
    .total-card .resultado-value {
      font-size: 1.2rem;
      color: #10b981;
    }

    #listaPuntos {
      margin-top: 1rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 1rem;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .ui-autocomplete {
      position: absolute !important;
      z-index: 2000 !important;
      max-height: 200px;
      overflow-y: auto;
      background: var(--bg-glass) !important;
      backdrop-filter: blur(10px);
      border: 1px solid var(--primary) !important;
      border-radius: 8px;
      color: white !important;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .ui-autocomplete li:hover {
      background: var(--primary) !important;
      color: white !important;
      border: none;
    }

    .modal-glass {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      z-index: 3000; display: flex; justify-content: center; align-items: center;
    }
    .modal-glass.d-none { display: none !important; }
    .modal-content-glass {
      background: rgba(15, 23, 42, 0.85); 
      backdrop-filter: blur(20px);
      border: 1px solid rgba(59, 130, 246, 0.4);
      border-radius: 20px; 
      width: 90%; max-width: 550px; max-height: 85vh;
      display: flex; flex-direction: column; color: white;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.2), 0 25px 50px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .modal-header {
      padding: 1.5rem; 
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-header h4 { margin: 0; font-size: 1.4rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
    .map-toggles {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn-flotante-small {
      background: var(--bg-glass);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.15);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.3rem;
      transition: all 0.2s;
      padding: 0;
    }
    .btn-flotante-small:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary);
    }
    .btn-close-glass:hover { transform: scale(1.2); box-shadow: none; color: #f87171;}
    .modal-body { padding: 1rem 1.5rem; overflow-y: auto; flex: 1; scrollbar-width: thin; }
    .modal-body::-webkit-scrollbar { width: 6px; }
    .modal-body::-webkit-scrollbar-thumb { background-color: var(--primary); border-radius: 10px; }
    
    .indicacion-paso {
      padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; gap: 15px; align-items: center;
    }
    .indicacion-icono { font-size: 1.5rem; color: var(--text-muted); }
    .indicacion-texto { flex: 1; font-size: 0.95rem; }
    .indicacion-dist { font-size: 0.85rem; color: #34d399; font-weight: bold; white-space: nowrap;}
    
    .btn-secundario {
      background: transparent;
      border: 1px solid var(--text-muted);
      color: var(--text-main);
      box-shadow: none;
    }
    .btn-secundario:hover {
      background: rgba(255,255,255,0.05);
      border-color: #fff;
    }
  </style>
</head>
<body>

  <!-- Modal Indicaciones -->
  <div id="modalIndicaciones" class="modal-glass d-none">
    <div class="modal-content-glass">
      <div class="modal-header">
        <h4><i class="bi bi-map-fill"></i> Indicaciones Paso a Paso</h4>
        <button class="btn-close-glass" onclick="cerrarIndicaciones()"><i class="bi bi-x-circle-fill"></i></button>
      </div>
      <div class="modal-body" id="listaIndicaciones">
        <!-- Pasos inyectados por JS -->
      </div>
    </div>
  </div>

  <div id="panel-izquierdo" class="panel-lateral">
    <h3><i class="bi bi-geo-alt"></i> Kova Maps</h3>
    <div class="grupo-entrada" id="inputs-ubicacion">
      <input id="origenLugar" type="text" class="entrada-ubicacion mb-2 autocomplete-input" placeholder="Lugar de Origen..." autocomplete="off" />
      <input id="destinoLugar" type="text" class="entrada-ubicacion mb-2 autocomplete-input" placeholder="Lugar de Destino..." autocomplete="off" />
    </div>

    <div class="grupo-entrada">
      
      <select id="tipoTransporte">
        <option value="auto">Vehículo Ligero (Auto)</option>
        <option value="camioneta">Vehículo Mediano (Camioneta)</option>
        <option value="camion">Vehículo Pesado (Camión)</option>
      </select>

      <select id="cilindros">
        <option value="4">Motor 4 Cilindros</option>
        <option value="6">Motor 6 Cilindros</option>
        <option value="8">Motor 8 Cilindros</option>
      </select>

      <select id="tipoGasolina">
        <option value="magna">Gasolina Magna</option>
        <option value="premium">Gasolina Premium</option>
        <option value="diesel">Diésel</option>
      </select>


      <button onclick="calcularRutaCompleta()"><i class="bi bi-play-fill"></i> Iniciar Ruta</button>
      <button onclick="restaurarBuscador(true)"><i class="bi bi-trash"></i> Eliminar Ruta</button>
      <button id="btnIndicaciones" class="btn-secundario" onclick="mostrarIndicaciones()" style="display:none; margin-top: 5px;"><i class="bi bi-list-ul"></i> Ver Indicaciones</button>
    </div>
  </div>

  <div id="panel-derecho" class="panel-lateral">
    <h3 style="font-size: 1.4rem; margin-bottom: 1rem;"><i class="bi bi-clipboard-data"></i> Resultados</h3>
    <div id="resultados">
      <!-- Los resultados se inyectarán aquí mediante JS -->
    </div>
    <div id="listaPuntos" class="d-none">
      <strong>Coordenadas:</strong>
      <ol id="ordenPuntos"></ol>
    </div>
  </div>

  <div id="mapa"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.js"></script>

  <script>
    const capaNormal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
    const capaOscura = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
    const capaGoogleHibrido = L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=es&x={x}&y={y}&z={z}', { maxZoom: 20 });

    let mapa = L.map('mapa', {
        center: [19.4326, -99.1332],
        zoom: 12,
        layers: [capaNormal],
        zoomControl: false // Ocultamos el zoom por defecto
    });

    const toggleControl = L.control({position: 'bottomleft'});
    toggleControl.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'map-toggles');
        div.innerHTML = `
          <button id="btnModoNoche" class="btn-flotante-small" onclick="toggleModoNoche()" title="Alternar Modo Noche">
            <i class="bi bi-moon-fill" id="iconoModoNoche"></i>
          </button>
          <button id="btnSatelite" class="btn-flotante-small" onclick="toggleSatelite()" title="Alternar Satélite 3D">
            <i class="bi bi-globe-americas"></i>
          </button>
        `;
        L.DomEvent.disableClickPropagation(div);
        return div;
    };
    toggleControl.addTo(mapa);

    // Agregamos el control de zoom después para que quede debajo de nuestros botones
    L.control.zoom({position: 'bottomleft'}).addTo(mapa);

    let modoNocheActivo = false;
    let modoSateliteActivo = false;

    // Convertí las funciones a globales exponiéndolas en window por si acaso
    window.toggleModoNoche = function() {
      if (modoNocheActivo) {
        mapa.removeLayer(capaOscura);
        if (!modoSateliteActivo) mapa.addLayer(capaNormal);
        document.getElementById('iconoModoNoche').className = 'bi bi-moon-fill';
        modoNocheActivo = false;
      } else {
        if (!modoSateliteActivo) mapa.removeLayer(capaNormal);
        mapa.addLayer(capaOscura);
        document.getElementById('iconoModoNoche').className = 'bi bi-sun-fill text-warning';
        modoNocheActivo = true;
      }
    };

    window.toggleSatelite = function() {
      if (modoSateliteActivo) {
        mapa.removeLayer(capaGoogleHibrido);
        if (modoNocheActivo) mapa.addLayer(capaOscura);
        else mapa.addLayer(capaNormal);
        modoSateliteActivo = false;
      } else {
        if (modoNocheActivo) mapa.removeLayer(capaOscura);
        else mapa.removeLayer(capaNormal);
        mapa.addLayer(capaGoogleHibrido);
        modoSateliteActivo = true;
      }
    };

    let controlRuta = null;
    let puntosIntermedios = [];
    let marcadores = [];

    let marcadoresCasetas = []; 

    function mostrarIndicaciones() { document.getElementById('modalIndicaciones').classList.remove('d-none'); }
    function cerrarIndicaciones() { document.getElementById('modalIndicaciones').classList.add('d-none'); }

    const preciosGasolina = {
      magna: 23.49,
      premium: 25.99,
      diesel: 25.15
    };

    const consumoPorCilindro = {
      4: 10,
      6: 6,
      8: 4
    };

    async function calcularRutaCompleta() {
      const inputs = document.querySelectorAll('.autocomplete-input');
      const lugares = [];
      inputs.forEach(inp => {
        if(inp.value.trim() !== '') lugares.push(inp.value.trim());
      });
      
      if(lugares.length < 2) {
        alert("Por favor ingresa al menos un Origen y un Destino.");
        return;
      }

      // Guardar datos en LocalStorage para que persistan al recargar
      localStorage.setItem('origen', document.getElementById('origenLugar').value);
      localStorage.setItem('destino', document.getElementById('destinoLugar').value);
      localStorage.setItem('gasolina', document.getElementById('tipoGasolina').value);
      localStorage.setItem('cilindros', document.getElementById('cilindros').value);
      
      restaurarBuscador(false);
      
      for(let i=0; i < lugares.length; i++) {
         let ubicacion = lugares[i];
         try {
           let response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${ubicacion}`);
           let data = await response.json();
           if(data && data.length > 0) {
             const latLng = L.latLng(data[0].lat, data[0].lon);
             puntosIntermedios.push({ nombre: ubicacion, latlng: latLng });
             agregarMarcador(latLng, ubicacion);
           } else {
             alert(`No se encontró la ubicación: ${ubicacion}`);
             return;
           }
         } catch(e) {
           console.error("Error geocodificando:", e);
         }
      }
      
      actualizarListaPuntos();
      actualizarRuta();
    }

    function agregarMarcador(latLng, texto) {
      const marcador = L.marker(latLng, { draggable: true }).addTo(mapa);
      marcador.bindPopup(texto).openPopup();
      marcador.on('dragend', () => {
        const idx = marcadores.indexOf(marcador);
        if (idx !== -1) {
          puntosIntermedios[idx].latlng = marcador.getLatLng();
          actualizarListaPuntos();
          if (controlRuta) actualizarRuta();
        }
      });
      marcadores.push(marcador);
    }

    function actualizarRuta() {
      if (controlRuta) {
        mapa.removeControl(controlRuta);
        controlRuta = null;
      }

      if (puntosIntermedios.length > 1) {
        controlRuta = L.Routing.control({
          waypoints: puntosIntermedios.map(p => p.latlng),
          routeWhileDragging: false,
          showAlternatives: true,
          altLineOptions: { styles: [{color: 'white', opacity: 0.6, weight: 6}] },
          router: L.Routing.osrmv1({ language: 'es' }),
          createMarker: () => null,
          lineOptions: { styles: [{ color: '#448aff', opacity: 1, weight: 5 }] }
        }).on('routeselected', function (e) {
          const resumen = e.route.summary;
          const distancia = resumen.totalDistance / 1000;
          const tipoGasolina = document.getElementById('tipoGasolina').value;
          const cilindros = parseInt(document.getElementById('cilindros').value);
          const consumo = consumoPorCilindro[cilindros]; 
          const precioGas = preciosGasolina[tipoGasolina];

          const litros = distancia / consumo;
          const costoGasolina = litros * precioGas;

          const tiempoHoras = distancia / 70;
          const minutos = Math.round(tiempoHoras * 60);

          document.getElementById('resultados').innerHTML = '';
          document.getElementById('panel-derecho').style.display = 'flex'; // Mostrar el panel de resultados
          marcadoresCasetas.forEach(m => mapa.removeLayer(m));
          marcadoresCasetas = [];
          
          const coordsRutaCompleta = e.route.coordinates;
          const instrucciones = e.route.instructions;
          
          // Generar Indicaciones
          let htmlPasos = '';
          
          instrucciones.forEach((inst, index) => {
            let icon = 'bi-arrow-up-circle';
            if(inst.type === 'Turn') icon = inst.modifier.includes('Right') ? 'bi-arrow-right-circle' : 'bi-arrow-left-circle';
            else if(inst.type === 'DestinationReached') icon = 'bi-geo-alt-fill';
            else if(inst.type === 'Roundabout') icon = 'bi-arrow-repeat';
            
            let distStr = inst.distance > 1000 ? (inst.distance/1000).toFixed(1) + ' km' : inst.distance + ' m';
            
            htmlPasos += `
              <div class="indicacion-paso">
                <i class="bi ${icon} indicacion-icono"></i>
                <div class="indicacion-texto">${inst.text}</div>
                <div class="indicacion-dist">${distStr}</div>
              </div>
            `;
          });
          
          document.getElementById('listaIndicaciones').innerHTML = htmlPasos;
          document.getElementById('btnIndicaciones').style.display = 'block';
          
          // Simular Zonas de Tráfico (Líneas Rojas superpuestas estilo Waze)
          let enTrafico = false;
          let segmentoTrafico = [];
          
          coordsRutaCompleta.forEach((coord, i) => {
              // Cada 20 puntos evaluamos si hay tráfico (basado determinísticamente en la coordenada)
              if (i % 20 === 0) {
                 let hash = Math.abs(Math.sin(coord.lat * coord.lng) * 10000);
                 enTrafico = (hash - Math.floor(hash)) < 0.25; // 25% de probabilidad de que sea zona roja
              }
              
              if (enTrafico) {
                  segmentoTrafico.push(coord);
              } else {
                  if (segmentoTrafico.length > 0) {
                      // Dibujar el tramo rojo superpuesto a la línea azul
                      let pl = L.polyline(segmentoTrafico, {color: '#ef4444', weight: 6, opacity: 1.0}).addTo(mapa);
                      marcadoresCasetas.push(pl); // Aprovechamos este arreglo para que se borren al reiniciar
                      segmentoTrafico = [];
                  }
              }
          });
          if (segmentoTrafico.length > 0) {
              let pl = L.polyline(segmentoTrafico, {color: '#ef4444', weight: 6, opacity: 1.0}).addTo(mapa);
              marcadoresCasetas.push(pl);
          }
          
          // Helper para crear cards
          const addCard = (id, iconClass, label, value, delay, extraClass='') => {
            const container = document.getElementById('resultados');
            container.innerHTML += `
              <div class="resultado-card ${extraClass}" id="${id}" style="animation-delay: ${delay}s">
                <i class="bi ${iconClass}"></i>
                <div class="resultado-content">
                  <span class="resultado-label">${label}</span>
                  <span class="resultado-value">${value}</span>
                </div>
              </div>
            `;
          };

          addCard('distancia', 'bi-signpost-split icon-dist', 'Distancia', `${distancia.toFixed(2)} km`, 0);
          addCard('tiempo', 'bi-clock-history icon-time', 'Tiempo Estimado', `${minutos} min`, 0.1);
          
          fetch('/analisis_ruta', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              ruta: coordsRutaCompleta.map(p => ({
                lat: p.lat,
                lon: p.lng
              })),
              tiempo_minutos: minutos
            })
          })
          .then(response => response.json())
          .then(data => {
            const costoCaseta = data.costo_casetas || 0;
            const tiempoOperador = data.tiempo_operador_horas || 0;
            const desnivel = data.desnivel_metros || 0;
            const zonas = data.zonas_criticas_detectadas || [];
            
            // Factor de desnivel
            const factorElevacion = 1 + ((desnivel / 100) * 0.01);
            const litrosReales = litros * factorElevacion;
            const costoGasolinaReal = litrosReales * precioGas;
            
            addCard('gasolina', 'bi-fuel-pump icon-gas', 'Combustible', `${litrosReales.toFixed(2)} L ($${costoGasolinaReal.toFixed(2)})`, 0.2);
            
            if (desnivel > 0) {
              addCard('desnivel', 'bi-moisture icon-elev', 'Desnivel Acumulado', `${desnivel.toFixed(0)}m (+${((factorElevacion-1)*100).toFixed(1)}% gas)`, 0.3);
            }

            const casetasCruzadas = data.casetas_cruzadas || [];
            
            if (casetasCruzadas.length > 0) {
              let listaCasetas = casetasCruzadas.map(c => `<div class="caseta-item">${c.nombre} <span class="float-end">$${c.costo}</span></div>`).join('');
              
              // Tarjeta 1: Lista de Casetas
              addCard('caseta_lista', 'bi-sign-intersection icon-toll', `Casetas Cruzadas`, `<div style="margin-top:5px; width:100%">${listaCasetas}</div>`, 0.4);
              
              // Tarjeta 2: Total de Casetas Aparte
              addCard('caseta_total', 'bi-cash-coin icon-toll', `Costo Peajes`, `$${costoCaseta.toFixed(2)} MXN`, 0.45);

              // Agregar marcadores al mapa
              casetasCruzadas.forEach(c => {
                let iconoCaseta = L.icon({
                  iconUrl: 'https://cdn-icons-png.flaticon.com/512/3214/3214532.png',
                  iconSize: [28, 28],
                  iconAnchor: [14, 28],
                  popupAnchor: [0, -28]
                });
                let marker = L.marker([c.lat, c.lon], { icon: iconoCaseta }).addTo(mapa);
                marker.bindPopup(`<b>Caseta: ${c.nombre}</b><br>Costo: $${c.costo} MXN`);
                marcadoresCasetas.push(marker);
              });

            } else {
              addCard('caseta_total', 'bi-cash-coin icon-toll', 'Costo Peajes', '$0.00 MXN', 0.4);
            }
            
            const horasOp = Math.floor(tiempoOperador);
            const minOp = Math.round((tiempoOperador - horasOp) * 60);
            addCard('tiempo_operador', 'bi-person-workspace icon-op', 'Tiempo Operador (NOM-087)', `${horasOp}h ${minOp}m`, 0.5);

            if (zonas.length > 0) {
              addCard('zonas', 'bi-exclamation-triangle-fill icon-alert', 'Zonas Críticas (Riesgo)', zonas.join(', '), 0.6);
              
              // Dibujar iconos de alerta para zonas detectadas
              const zonasInfo = data.zonas_criticas_info || [];
              zonas.forEach(nombreZona => {
                 let info = zonasInfo.find(z => z.nombre === nombreZona);
                 if (info) {
                    let iconAlerta = L.icon({
                       iconUrl: 'https://cdn-icons-png.flaticon.com/512/564/564249.png', // Icono de Advertencia
                       iconSize: [30, 30],
                        backgroundColor: ['#0ea5e9', '#10b981'],
                       popupAnchor: [0, -30]
                    });
                    let m = L.marker([info.lat, info.lon], {icon: iconAlerta}).addTo(mapa);
                    m.bindPopup(`<b>⚠️ Precaución</b><br>Ruta cruzando la zona de riesgo: ${info.nombre}`);
                    marcadoresCasetas.push(m); // Reutilizamos este arreglo para limpiar todo después
                 }
              });
            }

            // 1. Costo de Desgaste (Llantas y Mantenimiento)
            let factorVehiculoDesgaste = cilindros === 4 ? 0.8 : (cilindros === 6 ? 1.5 : 3.5);
            let costoDesgaste = (distancia * factorVehiculoDesgaste) + (desnivel * 0.5);
            addCard('desgaste', 'bi-gear-fill icon-op', 'Desgaste y Mantenimiento', `$${costoDesgaste.toFixed(2)} MXN`, 0.65);
            
            // 2. Geocercas y Restricciones (CDMX / MTY) para 8 cilindros (Vehículo Pesado)
            if (cilindros === 8) {
               let tocaCDMX = false;
               let tocaMTY = false;
               coordsRutaCompleta.forEach(c => {
                  let distCDMX = mapa.distance([c.lat, c.lng], [19.4326, -99.1332]);
                  let distMTY = mapa.distance([c.lat, c.lng], [25.6866, -100.3161]);
                  if (distCDMX < 25000) tocaCDMX = true; // Radio de 25km
                  if (distMTY < 20000) tocaMTY = true;   // Radio de 20km
               });
               if (tocaCDMX || tocaMTY) {
                  let ciudades = [];
                  let iconLegal = L.icon({
                     iconUrl: 'https://cdn-icons-png.flaticon.com/512/1008/1008928.png', // Señal de Prohibido
                     iconSize: [35, 35],
                     iconAnchor: [17, 35],
                     popupAnchor: [0, -35]
                  });
                  
                  if (tocaCDMX) {
                      ciudades.push('CDMX');
                      let m1 = L.marker([19.4326, -99.1332], {icon: iconLegal}).addTo(mapa);
                      m1.bindPopup(`<b>⛔ Restricción Vehículo Pesado</b><br>Horario restringido en Ciudad de México.`);
                      marcadoresCasetas.push(m1);
                  }
                  if (tocaMTY) {
                      ciudades.push('Monterrey');
                      let m2 = L.marker([25.6866, -100.3161], {icon: iconLegal}).addTo(mapa);
                      m2.bindPopup(`<b>⛔ Restricción Vehículo Pesado</b><br>Horario restringido en Monterrey.`);
                      marcadoresCasetas.push(m2);
                  }
                  addCard('restriccion', 'bi-shield-fill-exclamation text-danger', '¡Alerta Legal!', `Prohibido paso a pesados en zona centro de ${ciudades.join(' y ')}`, 0.68, 'border-danger');
               }
            }

            const totalViaje = costoCaseta + costoGasolinaReal + costoDesgaste;
            addCard('total', 'bi-wallet2 icon-total', 'Gran Total del Viaje', `$${totalViaje.toFixed(2)} MXN`, 0.7, 'total-card');

            // 3. Comparador Multi-Flota
            if (cilindros === 8) {
                // Comparar contra 2 camionetas de 4 cilindros
                let costoCamionetas = (distancia / consumoPorCilindro[4]) * precioGas * 2 + (costoCaseta * 2) + ((distancia * 0.8)*2);
                let ahorro = totalViaje - costoCamionetas;
                let msj = ahorro > 0 ? `Ahorrarías $${ahorro.toFixed(0)}` : `Cuesta $${Math.abs(ahorro).toFixed(0)} extra`;
                addCard('comparador', 'bi-arrow-left-right text-info', 'Comparador Flota', `Hacer ruta en 2 Camionetas: $${costoCamionetas.toFixed(0)}. ${msj}.`, 0.8);
            } else {
                // Comparar contra 1 Tráiler (V8)
                let costoTrailer = (distancia / consumoPorCilindro[8]) * precioGas + costoCaseta + (distancia * 3.5);
                let ahorro = totalViaje - costoTrailer;
                let msj = ahorro > 0 ? `Ahorrarías $${ahorro.toFixed(0)}` : `Cuesta $${Math.abs(ahorro).toFixed(0)} extra`;
                addCard('comparador', 'bi-arrow-left-right text-info', 'Comparador Flota', `Hacer ruta en 1 Tráiler (V8): $${costoTrailer.toFixed(0)}. ${msj}.`, 0.8);
            }

          })
          .catch(e => {
            console.error("Error fetching analisis_ruta:", e);
            addCard('total', 'bi-wallet2 icon-total', 'Gran Total del Viaje', `$${costoGasolina.toFixed(2)} MXN`, 0.7, 'total-card');
          });
          // Animación del auto removida
        }).addTo(mapa);

        mapa.fitBounds(L.latLngBounds(puntosIntermedios.map(p => p.latlng)));
      }
    }

    function iniciarAnimacionAuto(coords) {
      if (marcadorAuto) mapa.removeLayer(marcadorAuto);
      if (animacionIntervalo) clearInterval(animacionIntervalo);
      if (!coords.length) return;

      let index = 0;
      marcadorAuto = L.marker(coords[0], {
        icon: L.icon({
          iconUrl: 'https://cdn-icons-png.flaticon.com/512/3085/3085330.png',
          iconSize: [38, 38],
          iconAnchor: [19, 19]
        })
      }).addTo(mapa);

      animacionIntervalo = setInterval(() => {
        index++;
        if (index >= coords.length) index = 0;
        marcadorAuto.setLatLng(coords[index]);
      }, 200);
    }

    function actualizarListaPuntos() {
      const lista = document.getElementById('ordenPuntos');
      lista.innerHTML = '';
      puntosIntermedios.forEach(p => {
        const item = document.createElement('li');
        item.textContent = `${p.nombre}: ${p.latlng.lat.toFixed(5)}, ${p.latlng.lng.toFixed(5)}`;
        lista.appendChild(item);
      });
      document.getElementById('listaPuntos').classList.remove('d-none');
    }

    function restaurarBuscador(limpiarTodo = true) {
      marcadores.forEach(m => mapa.removeLayer(m));
      marcadores = [];
      puntosIntermedios = [];
      if (controlRuta) {
        mapa.removeControl(controlRuta);
        controlRuta = null;
      }
      marcadoresCasetas.forEach(m => mapa.removeLayer(m));
      marcadoresCasetas = [];
      document.getElementById('btnIndicaciones').style.display = 'none';



      document.getElementById('ordenPuntos').innerHTML = '';
      document.getElementById('resultados').innerHTML = '';
      document.getElementById('panel-derecho').style.display = 'none'; // Ocultar el panel de resultados
      mapa.setView([19.4326, -99.1332], 12);
      
      if(limpiarTodo) {
        document.getElementById('origenLugar').value = '';
        document.getElementById('destinoLugar').value = '';
        localStorage.removeItem('origen');
        localStorage.removeItem('destino');
      }
    }




    mapa.on('click', function(e) {
      let nombre = `Sitio ${puntosIntermedios.length + 1}`;
      puntosIntermedios.push({ nombre: nombre, latlng: e.latlng });
      agregarMarcador(e.latlng, nombre);
      actualizarListaPuntos();
    });

    function inicializarAutocomplete(elemento) {
      elemento.autocomplete({
        source: function(request, response) {
          $.getJSON(`https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${request.term}`, function(data) {
            response(data.map(item => ({
              label: item.display_name,
              value: item.display_name
            })));
          });
        },
        minLength: 3,
        delay: 300
      });
    }

    $(function() {
      inicializarAutocomplete($(".autocomplete-input"));
      
      // Cargar datos guardados al iniciar la página
      if(localStorage.getItem('origen')) document.getElementById('origenLugar').value = localStorage.getItem('origen');
      if(localStorage.getItem('destino')) document.getElementById('destinoLugar').value = localStorage.getItem('destino');
      if(localStorage.getItem('gasolina')) document.getElementById('tipoGasolina').value = localStorage.getItem('gasolina');
      if(localStorage.getItem('cilindros')) document.getElementById('cilindros').value = localStorage.getItem('cilindros');
    });
  </script>
</body>
</html>
